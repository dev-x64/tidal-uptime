services:
  tidal-uptime:
    build: .
    container_name: tidal-uptime
    env_file:
      - .env
    environment:
      CHECK_INTERVAL_SECONDS: "${CHECK_INTERVAL_SECONDS}"
      REQUEST_TIMEOUT_SECONDS: "10"
      DATABASE_PATH: "/app/data/uptime.db"
      STATUS_PAGE_WINDOW_HOURS: "${STATUS_PAGE_WINDOW_HOURS}"
      MAX_TRACK_RETRIES: "2"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      AUTH_COOKIE_SECRET: "${AUTH_COOKIE_SECRET}"
      ALERT_FAILURE_STREAK: "${ALERT_FAILURE_STREAK}"
      ALERT_RECOVERY_ENABLED: "${ALERT_RECOVERY_ENABLED}"
      ALERT_RECOVERY_STREAK: "${ALERT_RECOVERY_STREAK}"
      ALERT_TRIGGER_STATES: "${ALERT_TRIGGER_STATES}"
      ALERT_TRIGGER_PROBES: "${ALERT_TRIGGER_PROBES}"
      EMAIL_ALERTS_ENABLED: "${EMAIL_ALERTS_ENABLED}"
    volumes:
      - ./data:/app/data
      - ./.smtp.toml:/app/.smtp.toml:ro
    restart: unless-stopped
    networks:
      - proxy


networks:
  proxy:
    external: true